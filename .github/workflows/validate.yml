name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tooling
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Validate repository contracts
        run: divination-validate .
      - name: Require technical completeness and valid release records
        run: divination-readiness . --require-technical
      - name: Run tests
        run: pytest
      - name: Lint
        run: ruff check .
      - name: Build deterministic Skill packages
        run: divination-build . --system all --output dist
      - name: Report Bazi release readiness
        run: python -m systems.bazi.reviews.release --report-only
      - name: Verify committed Bazi evaluation report is current
        run: python -m systems.bazi.evaluations.run_evaluation
